apiVersion: apps/v1
kind: Deployment
metadata:
  name: pumpwood-streamlit-{image}
spec:
  replicas: 1
  selector:
    matchLabels:
      type: pumpwood-streamlit
      function: dashboard
      name: {image}
  template:
    metadata:
      labels:
        type: pumpwood-streamlit
        function: dashboard
        name: {image}
    spec:
      imagePullSecrets:
        - name: dockercfg
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: function
                operator: NotIn
                values:
                - system
      containers:
      - name: {image}
        image: {repository}/{image}:{version}
        imagePullPolicy: IfNotPresent
        ports:
          - containerPort: 5000
        env:
        - name: SERVICE_URL
          value: 'http://pumpwood-streamlit-{image}:5000/'

        # Microservice
        - name: MICROSERVICE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pumpwood-streamlit
              key: microservice_password
---
apiVersion : "v1"
kind: Service
metadata:
  name: pumpwood-streamlit-{image}
  labels:
    type: pumpwood-streamlit
    function: dashboard
    name: {image}
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    type: pumpwood-streamlit
    function: dashboard
    name: {image}
