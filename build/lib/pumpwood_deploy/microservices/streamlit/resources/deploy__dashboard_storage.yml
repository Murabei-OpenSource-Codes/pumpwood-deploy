apiVersion: apps/v1
kind: Deployment
metadata:
  name: pumpwood-streamlit-{image}
spec:
  replicas: 1
  selector:
    matchLabels:
      type: pumpwood-streamlit
      function: dashboard
      name: {image}
  template:
    metadata:
      labels:
        type: pumpwood-streamlit
        function: dashboard
        name: {image}
    spec:
      imagePullSecrets:
        - name: dockercfg
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: function
                operator: NotIn
                values:
                - system
      volumes:
      - name: gcp--storage-key
        secret:
          secretName: gcp--storage-key
      containers:
      - name: {image}
        image: {repository}/{image}:{version}
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - name: gcp--storage-key
            readOnly: true
            mountPath: /etc/secrets
        ports:
        - containerPort: 5000
        env:
        - name: SERVICE_URL
          value: 'http://pumpwood-streamlit-{image}:5000/'

        # Microservice
        - name: MICROSERVICE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pumpwood-streamlit
              key: microservice_password

        ###########
        # STORAGE #
        - name: STORAGE_BUCKET_NAME
          value: {bucket_name}
        - name: STORAGE_TYPE
          valueFrom:
            configMapKeyRef:
              name: storage
              key: storage_type

        # GCP
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/etc/secrets/key-storage.json"

        # AZURE
        - name: AZURE_STORAGE_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: azure--storage-key
              key: azure_storage_connection_string

        # AWS
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws--storage-key
              key: aws_access_key_id
              optional: true
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws--storage-key
              key: aws_secret_access_key
              optional: true

---
apiVersion : "v1"
kind: Service
metadata:
  name: pumpwood-streamlit-{image}
  labels:
    type: pumpwood-streamlit
    function: dashboard
    name: {image}
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    type: pumpwood-streamlit
    function: dashboard
    name: {image}
