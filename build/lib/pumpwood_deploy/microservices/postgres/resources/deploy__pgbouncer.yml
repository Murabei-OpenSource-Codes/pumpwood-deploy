apiVersion: apps/v1
kind: Deployment
metadata:
  name: {name}
spec:
  replicas: 1
  selector:
    matchLabels:
      type: db
      endpoint: {name}
      function: pgbouncer
  template:
    metadata:
      labels:
        type: db
        endpoint: {name}
        function: pgbouncer
    spec:
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: function
                operator: NotIn
                values:
                - system
      containers:
      # PGBouncer Container
      - name: pgbouncer
        image: andrebaceti/pgbouncer-auto-bootstrap:{version}
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: {postgres_secret}
              key: db_username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {postgres_secret}
              key: db_password
        - name: POSTGRES_HOST
          value: '{host}'
        - name: POSTGRES_PORT
          value: '{port}'
        - name: POSTGRES_DB
          value: '{database}'
        ports:
        - containerPort: 6432
---
apiVersion : "v1"
kind: Service
metadata:
  name: {name}
  labels:
    type: db
    endpoint: {name}
    function: pgbouncer
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 6432
  selector:
    type: db
    endpoint: {name}
    function: pgbouncer
